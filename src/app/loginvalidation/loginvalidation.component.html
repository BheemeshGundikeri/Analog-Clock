<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6 col-sm-8 col-10 border rounded p-4 shadow">
            <h2 class="text-center text-dark">Login Page</h2>
            <hr>
            <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                <!-- Email Field -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com"
                        required [(ngModel)]="email" name="email">
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" class="form-control"
                            placeholder="Enter your password" required [(ngModel)]="password" name="password">
                        <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                            <i class="bi" [ngClass]="isPasswordVisible ? 'bi-eye' : 'bi-eye-slash'"></i>
                        </button>
                    </div>                    
                </div>

                <!-- Error Message -->
                <div *ngIf="errorMessage" class="text-danger text-center mb-3">
                    {{ errorMessage }}
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>
